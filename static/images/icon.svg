<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 白色背景，适合大多数浏览器标签页 -->
  <rect width="100" height="100" rx="20" fill="#FFFFFF"/>
  
  <!-- 高斯曲线填充 -->
  <path d="M10,80 Q50,10 90,80 Z" fill="#E0E7FF" stroke="#5C7CFA" stroke-width="2"/>
  
  <!-- SLAM 轨迹线 -->
  <path d="M15,60 C30,60 40,40 50,40 S70,70 85,70" fill="none" stroke="#1A1D24" stroke-width="4" stroke-linecap="round"/>
  
  <!-- 相机/定位点图标 -->
  <rect x="42" y="32" width="16" height="12" rx="2" fill="#4AE3B5" stroke="#1A1D24" stroke-width="2"/>
  <circle cx="50" cy="38" r="3" fill="#1A1D24"/>
</svg>
